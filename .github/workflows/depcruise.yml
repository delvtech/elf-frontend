name: Dependency cruiser

on: [pull_request]

defaults:
  run:
    working-directory: frontend

jobs:
  depcruise:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v1
      - uses: actions/setup-node@v1
        with:
          node-version: "13.x"
      - run: npm ci
      - run: npm run build:tailwind
      - run: npm run depcruise
