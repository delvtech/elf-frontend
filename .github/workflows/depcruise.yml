name: Dependency Cruiser check

on: [pull_request]

defaults:
    run:
        working-directory: frontend

jobs:
  depcruise-check:
    runs-on: ubuntu-18.04

    steps:
      - uses: actions/checkout@v1
      - uses: actions/setup-node@v1
        with:
          node-version: "13.x"
      - run: npm ci
      - run: npm run depcruise
